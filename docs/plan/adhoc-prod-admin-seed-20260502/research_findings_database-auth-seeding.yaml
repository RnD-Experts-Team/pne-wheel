patterns_found:
	- category: structure
		pattern: Single default seeder with hard-coded user record
		description: The app currently seeds one explicit user directly in DatabaseSeeder instead of delegating to multiple seeders or environment-specific seeders.
		examples:
			- file: database/seeders/DatabaseSeeder.php
				location: database/seeders/DatabaseSeeder.php:15
				snippet: User::factory()->create(['name' => 'Test User', 'email' => 'test@example.com']);
		prevalence: common
	- category: naming
		pattern: Admin namespace denotes an authenticated management area
		description: Admin naming is used for route prefixes, tests, frontend pages, and controllers, but the enforcement model is authenticated ownership rather than elevated user role.
		examples:
			- file: routes/web.php
				location: routes/web.php:18
				snippet: Route::prefix('admin')->name('admin.')->group(function () {
			- file: app/Http/Controllers/Admin/WheelController.php
				location: app/Http/Controllers/Admin/WheelController.php:19
				snippet: $request->user()->wheels()
			- file: tests/Feature/Admin/WheelControllerTest.php
				location: tests/Feature/Admin/WheelControllerTest.php:19
				snippet: public function test_authenticated_user_sees_only_their_wheels(): void
		prevalence: common
	- category: architecture
		pattern: Ownership-based authorization without policies
		description: Resource access checks are implemented inline by comparing the authenticated user id to the owning foreign key.
		examples:
			- file: app/Http/Controllers/Admin/WheelController.php
				location: app/Http/Controllers/Admin/WheelController.php:262
				snippet: abort_unless($wheel->user_id === $request->user()?->id, 403);
		prevalence: occasional
	- category: security
		pattern: Production-relevant user credentials are not modeled separately from generic users
		description: The only persisted user attributes are identity, password, email verification, remember token, and Fortify two-factor data.
		examples:
			- file: app/Models/User.php
				location: app/Models/User.php:14
				snippet: #[Fillable(['name', 'email', 'password'])]
			- file: database/migrations/0001_01_01_000000_create_users_table.php
				location: database/migrations/0001_01_01_000000_create_users_table.php:14
				snippet: $table->string('email')->unique();
		prevalence: common
	- category: testing
		pattern: Factories are used for authenticated-user tests with no admin specialization
		description: Tests create generic users via User::factory()->create() and exercise access via actingAs.
		examples:
			- file: tests/Feature/Admin/WheelControllerTest.php
				location: tests/Feature/Admin/WheelControllerTest.php:21
				snippet: $alice = User::factory()->create();
			- file: tests/Feature/DashboardTest.php
				location: tests/Feature/DashboardTest.php:20
				snippet: $user = User::factory()->create();
		prevalence: common

related_architecture:
	components_relevant_to_domain:
		- component: DatabaseSeeder
			responsibility: Entry point for database seeding.
			location: database/seeders/DatabaseSeeder.php
			relationship_to_domain: domain depends on this
		- component: UserFactory
			responsibility: Creates persisted user records for tests and seed overrides.
			location: database/factories/UserFactory.php
			relationship_to_domain: domain depends on this
		- component: User model
			responsibility: Stores auth identity and wheel ownership.
			location: app/Models/User.php
			relationship_to_domain: domain depends on this
		- component: Fortify CreateNewUser action
			responsibility: Registration persistence path for new users.
			location: app/Actions/Fortify/CreateNewUser.php
			relationship_to_domain: this uses domain outputs
		- component: Admin WheelController
			responsibility: Authenticated wheel management.
			location: app/Http/Controllers/Admin/WheelController.php
			relationship_to_domain: this uses domain outputs
	interfaces_used_by_domain:
		- interface: Laravel\Fortify\Contracts\CreatesNewUsers
			location: app/Actions/Fortify/CreateNewUser.php
			usage_pattern: Fortify delegates user registration persistence through this contract implementation.
	data_flow_involving_domain: DatabaseSeeder or factories create User records in the users table; Fortify registration also creates User records with the same limited attribute set; authenticated routes then use the User->wheels relationship and ownership checks for the admin-prefixed area.
	key_relationships_to_domain:
		- from: DatabaseSeeder
			to: UserFactory
			relationship: calls
		- from: User
			to: Wheel
			relationship: hasMany
		- from: Admin WheelController
			to: User
			relationship: calls
		- from: CreateNewUser
			to: User
			relationship: calls

