		context: The codebase currently has no field, relation, or policy layer that can represent elevated admin semantics.
		type: decision_blocker
		affects:
			- adhoc-prod-admin-seed-20260502
	- question: How should the initial production admin password be supplied or rotated?
		context: Current seeding and factory patterns can create users, but the repository does not define a production credential-provisioning convention.
		type: research
		affects:
			- adhoc-prod-admin-seed-20260502

