	languages_used_in_domain:
		- PHP
	frameworks_used_in_domain:
		- name: Laravel 13
			usage_in_domain: Eloquent model persistence, migrations, seeders, route middleware, and controller flow.
		- name: Laravel Fortify
			usage_in_domain: Registration and two-factor support for User model authentication.
	libraries_used_in_domain:
