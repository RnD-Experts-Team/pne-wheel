plan_id: adhoc-prod-admin-seed-20260502
objective: Determine the current user seeding and admin-related model setup, and identify the smallest safe file surface to seed a production admin user with email admin@callme.wheels without changing code in this research task.
focus_area: database-auth-seeding
created_at: 2026-05-02T00:00:00Z
created_by: GitHub Copilot
status: completed

tldr: |
	- Database seeding currently creates exactly one hard-coded user in DatabaseSeeder: Test User <test@example.com>.
	- The User model has no admin flag, role relation, policy, or permissions package integration; "admin" in this codebase is a route/UI namespace for authenticated wheel owners, not a privileged account type.
	- The smallest current-codebase path for admin@callme.wheels is seeding a normal User record, not introducing role semantics.
	- The minimum file surface implied by the existing implementation is DatabaseSeeder plus one dedicated seeder file under database/seeders; UserFactory and User.php do not need changes unless explicit admin semantics are introduced.
	- If "admin" must mean elevated authorization, that is a separate schema and authorization change because no current model field or relationship can represent it.

research_metadata:
	methodology: Hybrid retrieval using targeted read_file on the named seeding and auth files, grep_search for admin and role concepts, semantic discovery via route and test inspection, and Context7 Laravel 13 docs lookup for seeding behavior.
	scope: Narrow backend/auth scope covering seeders, user factory, user model, user schema, Fortify user creation, admin routes, and admin-area tests.
	confidence: high
	coverage: 92
	decision_blockers: 1
	research_blockers: 0

