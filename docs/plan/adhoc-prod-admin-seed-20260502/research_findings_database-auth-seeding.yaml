			purpose_in_domain: Generates factory defaults for test users.
	external_apis_used_in_domain: []

related_conventions:
	naming_patterns_in_domain: Generic authenticated users are modeled as User; admin naming is used for route/controller/page organization rather than for a separate model concept.
	structure_of_domain: Seeders live in database/seeders, factories in database/factories, schema in database/migrations, and auth persistence in app/Actions/Fortify.
	error_handling_in_domain: Ownership violations use abort_unless(..., 403) inside the controller rather than policies or custom exceptions.
	testing_in_domain: Feature tests use RefreshDatabase, User::factory()->create(), and actingAs for authenticated flows.
	documentation_in_domain: No repository documentation describing admin-user provisioning or production seeding was found in the analyzed scope.

related_dependencies:
	internal:
		- component: database/seeders/DatabaseSeeder.php
			relationship_to_domain: seeds users directly
			direction: outbound
		- component: database/factories/UserFactory.php
			relationship_to_domain: supplies seeded and test user attributes
			direction: outbound
		- component: app/Actions/Fortify/CreateNewUser.php
			relationship_to_domain: creates the same user shape used elsewhere
			direction: bidirectional
		- component: app/Http/Controllers/Admin/WheelController.php
			relationship_to_domain: consumes authenticated user ownership
			direction: inbound
	external:
		- name: laravel/framework
			purpose_for_domain: Provides Eloquent models, seeders, migrations, routing, and authentication scaffolding.
		- name: laravel/fortify
			purpose_for_domain: Provides registration and two-factor authentication behavior around the User model.

domain_security_considerations:
	sensitive_areas:
		- area: Hard-coded seeded account
			location: database/seeders/DatabaseSeeder.php
			concern: The default seeder unconditionally creates a known user identity; current code does not distinguish local/demo/test provisioning from production provisioning.
		- area: Factory password default
			location: database/factories/UserFactory.php
			concern: The factory reuses a hash derived from the literal password string password for convenience in tests and seeded overrides.
		- area: Admin access semantics
			location: routes/web.php
			concern: The admin-prefixed area is protected by auth and verified middleware but not by any role or permission concept.
	authentication_patterns_in_domain: Session-based web authentication via Fortify with email as username and optional two-factor support.
	authorization_patterns_in_domain: Verified authenticated users may enter the admin-prefixed area; specific wheel mutations are restricted by ownership checks, not by roles.
	data_validation_in_domain: Fortify registration validates profile and password fields before creating users; seeded users bypass request validation and rely on model persistence constraints.

testing_patterns:
	framework: PHPUnit with Laravel feature testing
	coverage_areas:
		- authenticated dashboard access
		- guest redirects to login
		- ownership checks in admin-prefixed wheel management
		- Fortify authentication and verification flows
	test_organization: tests/Feature/Auth, tests/Feature/Admin, and tests/Feature/DashboardTest.php
	mock_patterns:
		- Storage::fake('public') for file upload behavior
		- actingAs($user) for authenticated access

