    verification:
      - docker compose -f docker-compose.production.yml config
      - php artisan config:clear && php artisan config:cache
      - php artisan test --compact tests/Feature/Support/ProductionConfigurationTest.php
    acceptance_criteria:
      - docker-compose.production.yml defines a postgres service, named persistent volume, healthcheck, and restart policy without introducing app containerization.
      - .env.example switches the documented production database contract to pgsql and includes APP_ENV, APP_DEBUG, APP_URL, and SSR-related env flags suitable for production.
      - config/inertia.php reads environment values and defaults to a production-safe non-SSR posture when no explicit SSR runtime is configured.
    failure_modes:
      - scenario: Compose configuration is syntactically valid but uses hostnames or ports that do not match the documented .env contract.
        likelihood: medium
        impact: high
        mitigation: Keep service naming and env keys identical between compose, .env.example, and deployment documentation.
      - scenario: SSR remains effectively enabled after config caching and causes first-request failures in production.
        likelihood: medium
        impact: high
        mitigation: Cover the resolved config values in a dedicated production configuration test and require config:cache in validation.
    tech_stack:
