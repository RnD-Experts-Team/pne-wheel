plan_id: adhoc-prod-admin-seed-20260502
objective: >-
  Add Docker support to run PostgreSQL for this Laravel/Inertia app on a Hostinger VPS,
  create a production deployment guide markdown file assuming nginx and certbot are already installed,
  remove the user-facing register page and disable registration backend routes,
  seed a bootstrap admin user with email admin@callme.wheels and password Callme123456!,
  and prepare the project for production readiness.
created_at: 2026-05-02T00:00:00Z
created_by: GitHub Copilot GPT-5.4
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 7
  risk_score: medium

tldr: |
  - Keep the production scope narrow: add Docker only for PostgreSQL, not for PHP, nginx, or the frontend runtime.
  - Reuse the existing Fortify feature gating to turn off registration links automatically, then remove the now-dead register page surface.
  - Replace the current hard-coded test user seed with a dedicated, idempotent bootstrap admin seeder that marks the account verified.
  - Make Inertia SSR production-safe by switching it to env-driven behavior so production does not point at a missing SSR runtime.
  - Validate the change set with three narrow PHPUnit slices plus command-level deploy checks, then document the exact Hostinger flow.

open_questions:
  - Whether the bootstrap admin seed should remain in the default DatabaseSeeder for every environment or only be invoked in production bootstrap flows; this plan assumes it stays in DatabaseSeeder because that matches the requested scope.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Production is switched to pgsql and SSR-aware config, but the app still tries to contact a missing SSR endpoint during deployment.
      likelihood: medium
      impact: high
      mitigation: Make config/inertia.php env-driven and default production to a safe non-SSR path unless an explicit SSR runtime is provisioned and documented.
    - scenario: Registration is only partially disabled, leaving an exposed register route or a dead link in the login or home flow.
      likelihood: medium
      impact: high
      mitigation: Remove the Fortify registration feature, remove the register view callback, and add route-plus-Inertia assertions that prove the register surface is gone.
    - scenario: The seeded admin account is created but cannot access the admin area because the app requires verified users.
      likelihood: medium
      impact: critical
      mitigation: Seed email_verified_at with a current timestamp and assert the seeded credentials and verification state in a dedicated test.
    - scenario: Docker support grows into full app containerization and increases deployment risk beyond the request.
      likelihood: low
      impact: medium
      mitigation: Keep the compose file limited to PostgreSQL, persistent storage, health checks, and restart policy; leave nginx, PHP-FPM, and Node on the host.
  assumptions:
    - Hostinger VPS will run nginx, PHP-FPM, Composer, Node or pnpm, and certbot directly on the host.
    - PostgreSQL is the only service that needs Docker support for this scope.
    - Wayfinder-generated register helpers may remain as dead generated artifacts if they are no longer imported by runtime-critical code.
    - The current admin area remains ownership-based; no role or admin flag schema work is required for the bootstrap account.

implementation_specification:
  code_structure: >-
    Keep implementation in five narrow slices: production runtime config, registration shutdown,
    bootstrap admin seeding, targeted regression coverage, and a Hostinger-specific deployment guide.
    Prefer env-driven configuration over new abstractions, and do not introduce app containerization,
    role systems, or a new deployment framework.
  affected_areas:
    - docker-compose.production.yml
    - .env.example
    - config/inertia.php
    - config/fortify.php
    - app/Providers/FortifyServiceProvider.php
    - resources/js/pages/auth/register.tsx
    - database/seeders/DatabaseSeeder.php
    - database/seeders/BootstrapAdminUserSeeder.php
    - tests/Feature/Auth/RegistrationDisabledTest.php
    - tests/Feature/Database/BootstrapAdminSeederTest.php
    - tests/Feature/Support/ProductionConfigurationTest.php
    - docs/deployment/hostinger-vps.md
  component_details:
    - component: PostgreSQL compose definition
      responsibility: Define a production-only Docker Compose service for PostgreSQL with persistent storage and predictable host-to-container connectivity.
      interfaces:
        - docker compose -f docker-compose.production.yml up -d
        - DB_CONNECTION=pgsql with DB_HOST, DB_PORT, DB_DATABASE, DB_USERNAME, and DB_PASSWORD in .env
    - component: Inertia SSR production config
      responsibility: Prevent production from targeting a missing SSR runtime while preserving the option to enable SSR later through environment variables.
      interfaces:
        - config('inertia.ssr.enabled')
        - config('inertia.ssr.url')
    - component: Fortify registration shutdown
      responsibility: Remove registration from exposed backend features and align registered auth views with the disabled feature set.
      interfaces:
        - config('fortify.features')
        - route availability for register and register.store
    - component: Bootstrap admin seeder
      responsibility: Seed or update the requested bootstrap admin account with a verified email and usable password.
      interfaces:
        - php artisan db:seed
        - DatabaseSeeder::run()
    - component: Hostinger deployment guide
      responsibility: Document the exact production rollout sequence for host-managed Laravel plus Dockerized PostgreSQL.
      interfaces:
        - Markdown steps for provisioning, deploy, verify, and rollback
  dependencies:
    - component: Fortify registration shutdown
      relationship: Supplies the route and UI behavior contract consumed by validation tests and the deployment guide.
    - component: Bootstrap admin seeder
      relationship: Supplies seeded credentials and seed invocation flow consumed by validation tests and the deployment guide.
    - component: PostgreSQL compose definition
      relationship: Supplies the database runtime contract consumed by env configuration, validation, and the deployment guide.
    - component: Inertia SSR production config
      relationship: Supplies production boot behavior consumed by validation tests and the deployment guide.
  integration_points:
    - Laravel Fortify feature registration in config/fortify.php
    - Fortify Inertia view callbacks in app/Providers/FortifyServiceProvider.php
    - Laravel database bootstrap path in database/seeders/DatabaseSeeder.php
    - Inertia SSR config loading in config/inertia.php
    - Production environment contract in .env.example
    - Hostinger deployment instructions in docs/deployment/hostinger-vps.md

