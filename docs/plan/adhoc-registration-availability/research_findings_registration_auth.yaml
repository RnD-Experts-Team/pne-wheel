plan_id: adhoc-registration-availability
objective: Research the minimal code paths that control user registration availability and UI exposure.
focus_area: registration_auth
created_at: '2026-05-02T00:00:00Z'
created_by: GitHub Copilot
status: completed

tldr: |
  - Backend registration is currently enabled because config/fortify.php includes Features::registration(), and Fortify runtime routes register GET /register and POST /register.
  - Frontend exposure is gated in two places by a canRegister prop: the public welcome page and the login page.
  - The dedicated register page exists as resources/js/pages/auth/register.tsx and is bound by FortifyServiceProvider::registerView(); the smallest edit points are config/fortify.php, app/Providers/FortifyServiceProvider.php, routes/web.php, resources/js/pages/welcome.tsx, and resources/js/pages/auth/login.tsx.

research_metadata:
  methodology: Hybrid retrieval via grep_search and semantic_search, targeted file reads, Context7 Fortify/Laravel docs lookup, and runtime verification with php artisan route:list.
  scope: Narrow auth-registration path only, covering Fortify config, Fortify view bindings, public route defaults, and frontend auth entry points.
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

