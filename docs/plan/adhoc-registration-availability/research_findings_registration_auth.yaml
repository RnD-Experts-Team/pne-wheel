patterns_found:
  - category: architecture
    pattern: Fortify feature flag drives both backend route registration and UI booleans.
    description: The same Features::enabled(Features::registration()) check is used to decide whether registration links are exposed in Inertia props.
    examples:
      - file: /Users/raghd/Desktop/callme-wheel/config/fortify.php
        location: config/fortify.php:147
        snippet: Features::registration()
      - file: /Users/raghd/Desktop/callme-wheel/app/Providers/FortifyServiceProvider.php
        location: app/Providers/FortifyServiceProvider.php:52
        snippet: 'canRegister' => Features::enabled(Features::registration())
      - file: /Users/raghd/Desktop/callme-wheel/routes/web.php
        location: routes/web.php:11
        snippet: ->defaults('canRegister', Features::enabled(Features::registration()))
    prevalence: common
  - category: structure
    pattern: Frontend register links use generated route helpers, not hardcoded URLs.
    description: Guest-facing links call register() from the generated routes module, while form submission uses store.form() from the register routes helper.
    examples:
      - file: /Users/raghd/Desktop/callme-wheel/resources/js/pages/welcome.tsx
        location: resources/js/pages/welcome.tsx:102
        snippet: href={register()}
      - file: /Users/raghd/Desktop/callme-wheel/resources/js/pages/auth/login.tsx
        location: resources/js/pages/auth/login.tsx:100
        snippet: <TextLink href={register()} tabIndex={5}>
      - file: /Users/raghd/Desktop/callme-wheel/resources/js/pages/auth/register.tsx
        location: resources/js/pages/auth/register.tsx:17
        snippet: {...store.form()}
    prevalence: common
  - category: naming
    pattern: Registration availability is exposed to the frontend as canRegister.
    description: Both the public landing page and login page consume the same prop name for link gating.
    examples:
      - file: /Users/raghd/Desktop/callme-wheel/resources/js/pages/welcome.tsx
        location: resources/js/pages/welcome.tsx:21
        snippet: canRegister?: boolean;
      - file: /Users/raghd/Desktop/callme-wheel/resources/js/pages/auth/login.tsx
        location: resources/js/pages/auth/login.tsx:17
        snippet: canRegister: boolean;
    prevalence: common

