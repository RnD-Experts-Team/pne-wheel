<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bezel" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#451a03"/>
    </radialGradient>
    <radialGradient id="hub" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#52525b"/>
    </radialGradient>
    <linearGradient id="pointer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Outer bezel ring -->
  <circle cx="32" cy="34" r="29" fill="url(#bezel)"/>
  <circle cx="32" cy="34" r="26" fill="#0a0a0b"/>

  <!-- Eight wedges (alternating ruby / amber) -->
  <g>
    <path d="M32 34 L 32 8 A 26 26 0 0 1 50.385 15.615 Z" fill="#b91c1c"/>
    <path d="M32 34 L 50.385 15.615 A 26 26 0 0 1 58 34 Z" fill="#facc15"/>
    <path d="M32 34 L 58 34 A 26 26 0 0 1 50.385 52.385 Z" fill="#b91c1c"/>
    <path d="M32 34 L 50.385 52.385 A 26 26 0 0 1 32 60 Z" fill="#facc15"/>
    <path d="M32 34 L 32 60 A 26 26 0 0 1 13.615 52.385 Z" fill="#b91c1c"/>
    <path d="M32 34 L 13.615 52.385 A 26 26 0 0 1 6 34 Z" fill="#facc15"/>
    <path d="M32 34 L 6 34 A 26 26 0 0 1 13.615 15.615 Z" fill="#b91c1c"/>
    <path d="M32 34 L 13.615 15.615 A 26 26 0 0 1 32 8 Z" fill="#facc15"/>
  </g>

  <!-- Subtle wedge separators -->
  <g stroke="rgba(0,0,0,0.45)" stroke-width="0.6" fill="none">
    <line x1="32" y1="8" x2="32" y2="60"/>
    <line x1="6" y1="34" x2="58" y2="34"/>
    <line x1="13.615" y1="15.615" x2="50.385" y2="52.385"/>
    <line x1="50.385" y1="15.615" x2="13.615" y2="52.385"/>
  </g>

  <!-- Pegs around the rim -->
  <g fill="#fde047" stroke="rgba(0,0,0,0.4)" stroke-width="0.4">
    <circle cx="32" cy="9.5" r="1.4"/>
    <circle cx="49.3" cy="16.7" r="1.4"/>
    <circle cx="56.5" cy="34" r="1.4"/>
    <circle cx="49.3" cy="51.3" r="1.4"/>
    <circle cx="32" cy="58.5" r="1.4"/>
    <circle cx="14.7" cy="51.3" r="1.4"/>
    <circle cx="7.5" cy="34" r="1.4"/>
    <circle cx="14.7" cy="16.7" r="1.4"/>
  </g>

  <!-- Center hub -->
  <circle cx="32" cy="34" r="6" fill="url(#hub)" stroke="#1f1f24" stroke-width="0.6"/>
  <circle cx="32" cy="34" r="2" fill="#facc15"/>

  <!-- Pointer at the top -->
  <path d="M32 8 L 28 -1 L 36 -1 Z" fill="url(#pointer)" stroke="rgba(0,0,0,0.5)" stroke-width="0.5"/>
  <circle cx="32" cy="2.5" r="2" fill="#52525b" stroke="rgba(0,0,0,0.5)" stroke-width="0.5"/>
</svg>
